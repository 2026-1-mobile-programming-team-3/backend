<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F5EDDE" />
  <title>시흥가개 — 도움 요청하기</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css" />
  <link rel="stylesheet" href="styles-v3.css" />
  <style>
    .wiz-topbar { display:flex; align-items:center; gap:12px; padding:18px 24px 12px; }
    .wiz-back { width:36px; height:36px; border-radius:12px; background:var(--card); border:1px solid var(--line);
      display:flex; align-items:center; justify-content:center; cursor:pointer; text-decoration:none; color:var(--ink-soft); }
    .wiz-back i { font-size:18px; }
    .wiz-title { font-size:17px; font-weight:900; letter-spacing:-0.04em; color:var(--ink); flex:1; text-align:center; padding-right:36px; }
    .wiz-step { font-size:13px; font-weight:800; color:var(--ink-mute); position:absolute; right:24px; top:30px; }

    /* 진행 표시기 */
    .wiz-progress { display:flex; gap:6px; padding:0 24px 20px; }
    .wp-seg { flex:1; height:3px; background:var(--line); border-radius:999px; position:relative; overflow:hidden; }
    .wp-seg.active::after { content:''; position:absolute; inset:0; background:var(--accent); }
    .wp-labels { display:flex; padding:0 24px 24px; gap:6px; }
    .wp-label { flex:1; font-size:11.5px; font-weight:800; color:var(--ink-mute); text-align:center; letter-spacing:-0.02em; }
    .wp-label.active { color:var(--accent); }

    .wizard-step { padding:0 24px; }
    .wiz-section-title {
      font-size:22px; font-weight:900; letter-spacing:-0.04em;
      color:var(--ink); margin:0 0 8px; line-height:1.3;
    }
    .wiz-section-sub { font-size:13.5px; font-weight:600; color:var(--ink-mute); margin-bottom:22px; }

    /* 펫 선택 그리드 */
    .pet-select-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .pet-v-card {
      display:flex; flex-direction:column; align-items:center; gap:6px;
      padding:18px 12px; background:var(--card); border:2px solid var(--line);
      border-radius:var(--r-xl); cursor:pointer;
      transition:border-color 0.18s, background 0.18s, transform 0.18s var(--spring);
    }
    .pet-v-card:active { transform:scale(0.97); }
    .pet-v-card.selected { border-color:var(--accent); background:var(--accent-soft); }
    .pet-v-icon { width:54px; height:54px; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:30px; }
    .pet-v-icon.dog { background:var(--accent-soft); color:var(--accent); }
    .pet-v-icon.cat { background:var(--raspberry-soft); color:var(--raspberry); }
    .pet-v-icon.other { background:var(--sand-soft); color:var(--sand); }
    .pet-v-name { font-size:15px; font-weight:900; color:var(--ink); letter-spacing:-0.025em; }
    .pet-v-info { font-size:11.5px; font-weight:600; color:var(--ink-mute); text-align:center; line-height:1.3; }
    .pet-v-add {
      grid-column:span 2; display:flex; flex-direction:column; align-items:center; gap:6px;
      padding:18px; border-radius:var(--r-xl); border:2px dashed var(--line-mid);
      background:transparent; color:var(--ink-mute); cursor:pointer;
      font-size:13px; font-weight:700;
    }
    .pet-v-add:active { background:var(--bg-2); }
    .pet-v-add i { font-size:22px; }

    /* 캘린더 */
    .cal-header { display:flex; align-items:center; justify-content:center; gap:24px; margin-bottom:14px; }
    .cal-nav-btn { width:30px; height:30px; border-radius:50%; background:var(--card); border:1px solid var(--line);
      display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .cal-nav-btn i { font-size:14px; color:var(--ink-soft); }
    .cal-month-label { font-size:16px; font-weight:900; color:var(--ink); letter-spacing:-0.03em; }
    .cal-weekdays { display:grid; grid-template-columns:repeat(7,1fr); text-align:center;
      font-size:12px; font-weight:800; color:var(--ink-mute); padding:0 4px 6px; }
    .cal-weekdays > span:first-child { color:var(--raspberry); }
    .cal-weekdays > span:last-child { color:#4A90E2; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
    .cal-grid > span:empty { aspect-ratio:1; }
    .cal-day { width:100%; aspect-ratio:1; border-radius:12px; border:none; background:none;
      font:inherit; font-size:14px; font-weight:700; color:var(--ink); cursor:pointer; transition:background 0.15s; }
    .cal-day:hover:not(:disabled) { background:var(--accent-soft); }
    .cal-day.selected { background:var(--ink); color:#fff; }
    .cal-day.past { color:var(--line-strong); cursor:not-allowed; }

    /* 시간 chip */
    .time-section { margin-top:24px; }
    .time-title { font-size:14px; font-weight:900; color:var(--ink); margin-bottom:10px; }
    .time-chips { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .time-chip {
      padding:10px 0; border-radius:999px;
      border:1.5px solid var(--line); background:var(--card);
      font:inherit; font-size:13px; font-weight:700; color:var(--ink-soft);
      cursor:pointer; transition:background 0.15s, border-color 0.15s, color 0.15s;
      text-align:center;
    }
    .time-chip:active { transform:scale(0.96); }
    .time-chip.active { background:var(--ink); color:#fff; border-color:var(--ink); }

    /* 입력 폼 */
    .form-wrap { display:flex; flex-direction:column; gap:14px; }
    .form-field-group { display:flex; flex-direction:column; gap:6px; }
    .form-field-label { font-size:13px; font-weight:800; color:var(--ink); letter-spacing:-0.02em; }
    .form-field-label em { color:var(--raspberry); font-style:normal; }
    .form-field {
      width:100%; padding:14px 16px; border-radius:var(--r-lg);
      border:1.5px solid var(--line); background:var(--card);
      font:inherit; font-size:14px; font-weight:600; color:var(--ink);
      outline:none; transition:border-color 0.18s; box-sizing:border-box; resize:none;
    }
    .form-field:focus { border-color:var(--accent); }
    .form-field::placeholder { color:var(--ink-mute); }
    .char-count { font-size:11px; font-weight:700; color:var(--ink-mute); text-align:right; margin-top:-2px; }

    /* 하단 CTA */
    .wiz-actions {
      padding:16px 24px calc(16px + env(safe-area-inset-bottom,0px));
      background:var(--bg); border-top:1px solid var(--line);
      display:flex; gap:10px; position:sticky; bottom:0;
    }
    .btn-back-step {
      flex:0 0 80px; padding:16px; border-radius:var(--r-lg);
      background:var(--card); border:1.5px solid var(--line);
      color:var(--ink-soft); font:inherit; font-size:14.5px; font-weight:800; cursor:pointer;
    }
    .btn-primary {
      flex:1; padding:16px; border-radius:var(--r-lg);
      background:var(--accent); color:#fff; border:none;
      font:inherit; font-size:15px; font-weight:900; cursor:pointer;
      letter-spacing:-0.02em;
    }
    .btn-primary:active { transform:scale(0.97); }
    .btn-primary:disabled { opacity:0.5; }
  </style>
</head>
<body>
<div class="app">
  <main class="screen">
    <header class="wiz-topbar">
      <a class="wiz-back" href="match.html"><i class="ph ph-arrow-left"></i></a>
      <h1 class="wiz-title">도움 요청하기</h1>
      <span class="wiz-step" id="step-indicator">1/3</span>
    </header>

    <div class="wiz-progress">
      <div class="wp-seg active" data-step="0"></div>
      <div class="wp-seg" data-step="1"></div>
      <div class="wp-seg" data-step="2"></div>
    </div>
    <div class="wp-labels">
      <span class="wp-label active" data-step="0">반려동물</span>
      <span class="wp-label" data-step="1">일정</span>
      <span class="wp-label" data-step="2">요청 내용</span>
    </div>

    <!-- Step 1: 반려동물 -->
    <section class="wizard-step" id="step-0">
      <h2 class="wiz-section-title">어떤 반려동물과<br/>함께 이동하나요?</h2>
      <p class="wiz-section-sub">도움이 필요한 반려동물을 선택해 주세요.</p>
      <div class="pet-select-grid" id="pet-select-grid"></div>
    </section>

    <!-- Step 2: 일정 -->
    <section class="wizard-step" id="step-1" hidden>
      <h2 class="wiz-section-title">언제 도움이<br/>필요한가요?</h2>
      <p class="wiz-section-sub">희망 날짜와 시간을 선택해 주세요.</p>
      <div class="cal-header">
        <button class="cal-nav-btn" type="button" id="cal-prev"><i class="ph ph-caret-left"></i></button>
        <span class="cal-month-label" id="cal-month-label"></span>
        <button class="cal-nav-btn" type="button" id="cal-next"><i class="ph ph-caret-right"></i></button>
      </div>
      <div class="cal-weekdays">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div class="cal-grid" id="calendar-grid"></div>

      <div class="time-section">
        <div class="time-title">희망 시간</div>
        <div class="time-chips">
          <button class="time-chip" type="button" data-time="09:00">09:00</button>
          <button class="time-chip" type="button" data-time="10:00">10:00</button>
          <button class="time-chip" type="button" data-time="11:00">11:00</button>
          <button class="time-chip" type="button" data-time="12:00">12:00</button>
          <button class="time-chip" type="button" data-time="13:00">13:00</button>
          <button class="time-chip" type="button" data-time="14:00">14:00</button>
          <button class="time-chip" type="button" data-time="15:00">15:00</button>
          <button class="time-chip" type="button" data-time="16:00">16:00</button>
          <button class="time-chip" type="button" data-time="17:00">17:00</button>
          <button class="time-chip" type="button" data-time="18:00">18:00</button>
          <button class="time-chip" type="button" data-time="19:00">19:00</button>
          <button class="time-chip" type="button" data-time="20:00">20:00</button>
        </div>
      </div>
    </section>

    <!-- Step 3: 요청 내용 -->
    <section class="wizard-step" id="step-2" hidden>
      <h2 class="wiz-section-title">요청 내용이<br/>무엇인가요?</h2>
      <p class="wiz-section-sub">봉사자가 어떤 도움을 줘야 하는지 알려주세요.</p>
      <form class="form-wrap" id="match-new-form">
        <div class="form-field-group">
          <label class="form-field-label" for="match-title">제목 <em>*</em></label>
          <input class="form-field" type="text" id="match-title" placeholder="예: 정왕동 실외견 병원 이동 부탁드립니다." maxlength="100" required />
        </div>
        <div class="form-field-group">
          <label class="form-field-label" for="match-address">목적지 <em>*</em></label>
          <input class="form-field" type="text" id="match-address" placeholder="예: 정왕 동물병원" maxlength="255" />
        </div>
        <div class="form-field-group">
          <label class="form-field-label" for="match-content">요청 메모 <em>*</em></label>
          <textarea class="form-field" id="match-content" rows="5" maxlength="2000"
            placeholder="봉사자에게 전달할 내용을 입력하세요.&#10;예: 슬개골 수술 후 검진이에요.&#10;차량이 가능하신 분이면 좋겠어요." required></textarea>
          <div class="char-count"><span id="char-cnt">0</span>/2000</div>
        </div>
      </form>
    </section>

    <div style="height:24px"></div>
  </main>

  <!-- 하단 액션 -->
  <div class="wiz-actions" id="actions-step-0">
    <button class="btn-primary" id="btn-step1-next">→ 일정 선택</button>
  </div>
  <div class="wiz-actions" id="actions-step-1" hidden>
    <button class="btn-back-step" type="button" id="btn-step2-back">이전</button>
    <button class="btn-primary" id="btn-step2-next">→ 요청 내용 작성</button>
  </div>
  <div class="wiz-actions" id="actions-step-2" hidden>
    <button class="btn-back-step" type="button" id="btn-step3-back">이전</button>
    <button class="btn-primary" type="submit" form="match-new-form">요청 등록하기</button>
  </div>
</div>
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<script src="preview-app.js"></script>
<script>
// step별 액션바 토글 + 진행 표시기 갱신
document.addEventListener("DOMContentLoaded", () => {
  PreviewApp.bootMatchNew();
  // step 전환 옵저버 — wizard-step hidden 변경 시 액션바도 토글
  const steps = ['step-0','step-1','step-2'];
  const actions = ['actions-step-0','actions-step-1','actions-step-2'];
  const obs = new MutationObserver(() => {
    steps.forEach((id, i) => {
      const hidden = document.getElementById(id).hidden;
      document.getElementById(actions[i]).hidden = hidden;
      document.querySelector(`.wp-seg[data-step="${i}"]`)?.classList.toggle('active', !hidden || (i < currentStep()));
      document.querySelector(`.wp-label[data-step="${i}"]`)?.classList.toggle('active', !hidden);
    });
  });
  function currentStep() {
    return steps.findIndex(id => !document.getElementById(id).hidden);
  }
  steps.forEach(id => obs.observe(document.getElementById(id), { attributes:true, attributeFilter:['hidden'] }));

  // char count
  document.getElementById('match-content')?.addEventListener('input', function() {
    document.getElementById('char-cnt').textContent = this.value.length;
  });
});
</script>
</body>
</html>
