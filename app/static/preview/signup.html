<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F5EDDE" />
  <title>시흥가개 — 회원가입</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css" />
  <link rel="stylesheet" href="styles-v3.css" />
  <style>
    .auth-topbar { padding:18px 24px 0; }
    .back-btn { width:36px; height:36px; border-radius:12px; background:var(--card); border:1px solid var(--line);
      display:flex; align-items:center; justify-content:center; text-decoration:none; color:var(--ink-soft); }
    .auth-wrap { display:flex; flex-direction:column;
      min-height:100dvh; padding:0 32px calc(32px + env(safe-area-inset-bottom,0px)); }
    .auth-headline { padding:24px 0 28px; }
    .auth-headline h1 { font-size:26px; font-weight:900; letter-spacing:-0.045em; color:var(--ink); line-height:1.3; }
    .auth-headline p { font-size:13px; font-weight:600; color:var(--ink-mute); margin-top:8px; }
    .auth-form { width:100%; display:flex; flex-direction:column; gap:12px; }
    .form-field-group { display:flex; flex-direction:column; gap:6px; }
    .form-label { font-size:12.5px; font-weight:800; color:var(--ink); letter-spacing:-0.02em; }
    .form-label em { color:var(--raspberry); font-style:normal; }
    .auth-field { width:100%; padding:14px 16px; border-radius:var(--r-lg);
      border:1.5px solid var(--line); background:var(--card);
      font:inherit; font-size:14px; font-weight:600; color:var(--ink);
      outline:none; transition:border-color 0.18s; box-sizing:border-box; }
    .auth-field:focus { border-color:var(--accent); }
    .gps-row { display:flex; gap:8px; }
    .gps-row .auth-field { flex:1; }
    .btn-gps { padding:0 14px; border-radius:var(--r-lg); background:var(--accent-soft); border:1px solid rgba(208,138,78,0.18);
      font:inherit; font-size:12px; font-weight:800; color:var(--accent); cursor:pointer; white-space:nowrap;
      display:inline-flex; align-items:center; gap:4px; }
    .btn-gps i { font-size:14px; }
    .auth-btn { width:100%; padding:16px; border-radius:var(--r-lg);
      background:var(--accent); color:#fff; border:none; font:inherit;
      font-size:15px; font-weight:900; cursor:pointer; margin-top:8px;
      transition:transform 0.18s var(--spring); }
    .auth-btn:active { transform:scale(0.97); }
    .auth-err { font-size:12.5px; font-weight:700; color:var(--raspberry); text-align:center; min-height:18px; }
    .auth-link { font-size:13px; font-weight:600; color:var(--ink-mute);
      text-align:center; margin-top:16px; }
    .auth-link a { color:var(--accent); font-weight:800; }
    .help { font-size:11.5px; font-weight:600; color:var(--ink-mute); margin-top:-2px; }
  </style>
</head>
<body>
<div class="auth-topbar">
  <a class="back-btn" href="login.html"><i class="ph ph-arrow-left"></i></a>
</div>
<div class="auth-wrap">
  <div class="auth-headline">
    <h1>처음이라면<br/>회원가입을 진행해 주세요.</h1>
    <p>가입 후 매칭·매장·뉴스 모두 이용할 수 있어요</p>
  </div>
  <form class="auth-form" id="signupForm">
    <div class="form-field-group">
      <label class="form-label" for="email">이메일 <em>*</em></label>
      <input class="auth-field" type="email" id="email" placeholder="example@email.com" autocomplete="email" required />
    </div>
    <div class="form-field-group">
      <label class="form-label" for="nickname">닉네임 <em>*</em></label>
      <input class="auth-field" type="text" id="nickname" placeholder="2~20자 닉네임" minlength="2" maxlength="20" required />
    </div>
    <div class="form-field-group">
      <label class="form-label" for="password">비밀번호 <em>*</em></label>
      <input class="auth-field" type="password" id="password" placeholder="8자 이상 (영문·숫자·특수문자 포함)" autocomplete="new-password" minlength="8" required />
      <div class="help">영문 + 숫자 + 특수문자 각 1자 이상</div>
    </div>
    <div class="form-field-group">
      <label class="form-label" for="phone">전화번호</label>
      <input class="auth-field" type="tel" id="phone" placeholder="010-1234-5678 (선택)" autocomplete="tel" />
    </div>
    <div class="form-field-group">
      <label class="form-label" for="region-dong">거주 지역</label>
      <div class="gps-row">
        <input class="auth-field" type="text" id="region-dong" placeholder="동 이름 (예: 정왕동)" maxlength="50" />
        <button type="button" class="btn-gps" id="btn-region-gps"><i class="ph ph-crosshair"></i>현재 위치</button>
      </div>
    </div>
    <input type="hidden" id="region-si" value="" />
    <div class="auth-err" id="errMsg"></div>
    <button class="auth-btn" type="submit">가입하기</button>
  </form>
  <div class="auth-link">이미 계정이 있으신가요? <a href="login.html">로그인</a></div>
</div>
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<script src="preview-app.js"></script>
<script>
(() => {
  DebugPanel.mount();
  // GPS 자동 채움
  document.getElementById('btn-region-gps').addEventListener('click', async () => {
    if (!navigator.geolocation) { Toast.error('GPS를 사용할 수 없어요'); return; }
    try {
      const pos = await new Promise((res, rej) =>
        navigator.geolocation.getCurrentPosition(res, rej, { timeout: 6000 })
      );
      // 회원가입 전이라 인증 없는 호출은 401 — 인증 없는 endpoint가 필요하지만
      // 임시: 좌표를 표시만 함. 정식 가입 후 profile-edit 에서 채우게 안내.
      // 인증 없는 카카오 reverse는 백엔드가 401 처리.
      try {
        const geo = await api.get(`/api/v1/geo/reverse?lat=${pos.coords.latitude}&lng=${pos.coords.longitude}`);
        document.getElementById('region-si').value = geo.si || '시흥시';
        document.getElementById('region-dong').value = geo.dong || '';
        Toast.ok(`현재 위치: ${geo.label}`);
      } catch (err) {
        // 비인증 호출이라 실패 — 좌표만 채워두고 직접 입력 안내
        Toast.info('로그인 후 위치를 자동으로 설정할 수 있어요. 지금은 동 이름을 직접 입력해 주세요.');
      }
    } catch (err) { Toast.error('위치 조회 실패'); }
  });

  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = {
      email: document.getElementById('email').value.trim(),
      nickname: document.getElementById('nickname').value.trim(),
      password: document.getElementById('password').value,
    };
    const phone = document.getElementById('phone').value.trim();
    if (phone) payload.phone = phone;
    const regionDong = document.getElementById('region-dong').value.trim();
    if (regionDong) {
      payload.region_dong = regionDong;
      payload.region_si = document.getElementById('region-si').value || '시흥시';
    }
    const errEl = document.getElementById('errMsg');
    const btn = e.submitter || e.target.querySelector('[type=submit]');
    errEl.textContent = '';
    const restoreBtn = window.Loading ? Loading.bindButton(btn, '가입 중...') : (btn.disabled = true, () => { btn.disabled = false; });
    try {
      await Auth.signup(payload);
      // signup이 토큰을 반환하지 않으면 Auth.signup이 자동 로그인 시도
      if (Auth.getAccess()) {
        location.href = 'index.html';
      } else {
        Toast.ok('가입 완료! 로그인해 주세요.');
        setTimeout(() => location.href = 'login.html', 1000);
      }
    } catch (err) {
      const detail = err.body?.detail;
      errEl.textContent = Array.isArray(detail)
        ? '입력 정보를 다시 확인해 주세요. (비밀번호 정책·닉네임 길이 등)'
        : (detail || err.message);
      restoreBtn();
    }
  });
})();
</script>
</body>
</html>
