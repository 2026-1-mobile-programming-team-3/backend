<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F5EDDE" />
  <title>시흥가개 — 대화</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css" />
  <link rel="stylesheet" href="styles-v3.css" />
  <style>
    /* ── 헤더 ── */
    .chat-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--card);
      position: sticky; top: 0; z-index: 20;
      flex-shrink: 0;
    }
    .ch-back {
      width: 36px; height: 36px; border-radius: 12px;
      background: var(--card); border: 1px solid var(--line);
      display: flex; align-items: center; justify-content: center;
      color: var(--ink); box-shadow: var(--shadow-sm);
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.18s var(--spring);
    }
    .ch-back:active { transform: scale(0.88); }
    .ch-back i { font-size: 17px; }

    .ch-vol { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .ch-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 900; color: #fff;
      flex-shrink: 0;
    }
    .ch-name { font-size: 15px; font-weight: 900; letter-spacing: -0.035em; color: var(--ink); }
    .ch-meta {
      font-size: 11px; font-weight: 600; color: var(--ink-mute);
      display: flex; align-items: center; gap: 3px; margin-top: 1px;
    }
    .ch-meta i { font-size: 11px; }

    .btn-accept {
      padding: 9px 18px; border-radius: 999px;
      background: var(--raspberry); color: #fff;
      font: inherit; font-size: 13px; font-weight: 900;
      letter-spacing: -0.025em;
      cursor: pointer; border: none; flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(201,71,106,0.35);
      transition: transform 0.18s var(--spring), box-shadow 0.18s var(--ease-out);
    }
    .btn-accept:active { transform: scale(0.92); box-shadow: 0 2px 6px rgba(201,71,106,0.25); }
    .btn-accept.done {
      background: var(--mint); box-shadow: 0 4px 14px rgba(122,155,110,0.3);
    }

    /* ── 요청 요약 카드 ── */
    .req-summary {
      margin: 10px 16px;
      padding: 13px 16px;
      background: var(--card);
      border-radius: var(--r-xl);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
      display: flex; align-items: center; gap: 12px;
      cursor: pointer;
      transition: transform 0.18s var(--spring);
    }
    .req-summary:active { transform: scale(0.982); }
    .rs-icon {
      width: 38px; height: 38px; border-radius: 12px;
      background: var(--raspberry-dim); color: var(--raspberry);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .rs-icon i { font-size: 19px; }
    .rs-body { flex: 1; min-width: 0; }
    .rs-title {
      font-size: 13px; font-weight: 800; color: var(--ink);
      letter-spacing: -0.03em; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rs-meta { font-size: 11px; font-weight: 600; color: var(--ink-mute); margin-top: 2px; }
    .rs-status {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 999px;
      background: var(--raspberry-dim); color: var(--raspberry);
      font-size: 10.5px; font-weight: 800; flex-shrink: 0;
    }
    .rs-status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--raspberry); }

    /* ── 채팅 메시지 영역 ── */
    .chat-area {
      padding: 8px 16px;
    }

    .date-divider {
      text-align: center;
      font-size: 11px; font-weight: 700; color: var(--ink-ghost);
      margin: 8px 0 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .date-divider::before, .date-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--line);
    }

    .msg-row {
      display: flex; gap: 8px; margin-bottom: 14px;
      align-items: flex-end;
    }
    .msg-row.sent { flex-direction: row-reverse; }

    .msg-av {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 900; color: #fff;
      flex-shrink: 0; margin-bottom: 2px;
    }

    .msg-content { display: flex; flex-direction: column; max-width: 72%; }
    .msg-row.sent .msg-content { align-items: flex-end; }

    .bubble {
      padding: 10px 14px;
      font-size: 13.5px; font-weight: 600; line-height: 1.55;
      word-break: break-word;
    }
    .msg-row.received .bubble {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px 16px 16px 4px;
      color: var(--ink);
      box-shadow: var(--shadow-xs);
    }
    .msg-row.sent .bubble {
      background: var(--ink);
      color: #fff;
      border-radius: 16px 16px 4px 16px;
    }

    .msg-time {
      font-size: 10px; font-weight: 600;
      color: var(--ink-ghost);
      margin-top: 4px; padding: 0 2px;
    }

    .sys-notice {
      display: flex; align-items: center; gap: 8px;
      margin: 4px 0 16px;
      padding: 9px 14px;
      background: rgba(30,18,10,0.04);
      border-radius: 12px;
      font-size: 11.5px; font-weight: 600; color: var(--ink-mute);
      line-height: 1.4;
    }
    .sys-notice i { font-size: 14px; color: var(--accent); flex-shrink: 0; }

    /* ── 입력창 ── */
    .chat-input-bar {
      position: absolute; left: 0; right: 0;
      bottom: max(16px, env(safe-area-inset-bottom,0px));
      padding: 10px 16px;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--line);
      display: flex; align-items: center; gap: 10px;
      z-index: 20;
    }
    .cib-field {
      flex: 1;
      height: 40px; padding: 0 14px;
      background: var(--bg-2);
      border-radius: 999px; border: 1.5px solid var(--line-mid);
      font: inherit; font-size: 14px; color: var(--ink);
      outline: none;
    }
    .cib-field::placeholder { color: var(--ink-ghost); }
    .cib-field:focus { border-color: var(--accent); background: var(--card); }
    .cib-send {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--ink); color: #fff; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.18s var(--spring);
    }
    .cib-send:active { transform: scale(0.88); }
    .cib-send i { font-size: 18px; }

    /* ── 동적 채팅 메시지 영역 ── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      background: var(--bg);
    }
    .ch-msg { max-width: 78%; display: flex; }
    .ch-msg.mine { align-self: flex-end; }
    .ch-msg.other { align-self: flex-start; }
    .ch-bubble {
      padding: 9px 13px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.45;
    }
    .ch-msg.mine .ch-bubble  { background: var(--accent); color: #fff; }
    .ch-msg.other .ch-bubble { background: var(--card); color: var(--ink); border: 1px solid var(--line); }
    .chat-input-bar {
      display: flex; gap: 8px;
      padding: 10px 14px 16px;
      border-top: 1px solid var(--line);
      background: var(--card);
    }
    #chat-input {
      flex: 1; padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--bg);
      font-size: 13.5px;
      outline: none;
    }
    .ch-send {
      padding: 9px 18px;
      border-radius: 999px;
      background: var(--raspberry); color: #fff;
      font-weight: 900; font-size: 13px;
      border: none; cursor: pointer;
    }
  </style>
</head>
<body data-tab="match">
<div class="app" id="appRoot">
  <main class="screen" id="screen">

    <!-- 헤더 -->
    <header class="chat-header anim-fade-slide-up">
      <button class="ch-back" onclick="history.back()">
        <i class="ph-bold ph-arrow-left"></i>
      </button>
      <div class="ch-vol">
        <div class="ch-avatar" style="background:linear-gradient(135deg,var(--mint),#5A8A50)">A</div>
        <div>
          <div class="ch-name" data-bind="opponent.nickname">—</div>
          <div class="ch-meta" data-bind="opponent.status_label">—</div>
        </div>
      </div>
      <button class="btn-accept anim-scale-in delay-1" id="acceptBtn">수락</button>
    </header>

    <!-- 요청 요약 -->
    <a class="req-summary anim-fade-slide-up delay-1" href="match.html">
      <div class="rs-icon"><i class="ph ph-handshake"></i></div>
      <div class="rs-body">
        <div class="rs-title">정왕동 실외견 병원 이동 부탁드립니다</div>
        <div class="rs-meta">5월 10일 (일) · 오전 10:00 · 정왕동 → 정왕 동물병원</div>
      </div>
      <div class="rs-status">
        <div class="rs-status-dot"></div>검토 중
      </div>
    </a>

    <!-- 채팅 메시지 -->
    <div id="chat-messages" class="chat-messages"></div>

  </main>

  <!-- 메시지 입력 -->
  <form id="chat-input-form" class="chat-input-bar">
    <input id="chat-input" type="text" placeholder="메시지 입력" autocomplete="off" />
    <button type="submit" class="ch-send">전송</button>
  </form>
</div>

<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<script src="design-nav.js"></script>
<script src="preview-app.js"></script>
<script>document.addEventListener("DOMContentLoaded", () => PreviewApp.bootChat());</script>
</body>
</html>
