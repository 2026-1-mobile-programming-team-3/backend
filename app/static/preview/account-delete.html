<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F5EDDE" />
  <title>시흥가개 — 계정 탈퇴</title>
  <link rel="stylesheet" as="style" crossorigin href="vendor/suit/SUIT-Variable.css" />
  <link rel="stylesheet" href="styles-v3.css" />
  <style>
    .edit-topbar { display:flex; align-items:center; gap:12px; padding:18px 24px 16px; }
    .back-btn { width:36px; height:36px; border-radius:12px; background:var(--card); border:1px solid var(--line);
      display:flex; align-items:center; justify-content:center; text-decoration:none; color:var(--ink-soft); }
    .page-title { font-size:17px; font-weight:900; color:var(--ink); flex:1; text-align:center; padding-right:36px; }
    .warn-card { margin:0 24px 18px; padding:16px 18px;
      background:var(--raspberry-soft); border:1px solid rgba(240,66,112,0.18); border-radius:var(--r-xl); }
    .warn-title { font-size:14px; font-weight:900; color:var(--raspberry); display:flex; align-items:center; gap:6px; margin-bottom:8px; }
    .warn-title i { font-size:18px; }
    .warn-body { font-size:12.5px; font-weight:600; color:var(--ink-soft); line-height:1.65; }
    .warn-body ul { margin:6px 0 0; padding-left:18px; }
    .warn-body li { margin-bottom:4px; }
    form { padding:0 24px; display:flex; flex-direction:column; gap:14px; }
    .form-label { font-size:13px; font-weight:800; color:var(--ink); }
    .form-field {
      width:100%; padding:14px 16px; border-radius:var(--r-lg);
      border:1.5px solid var(--line); background:var(--card);
      font:inherit; font-size:14px; font-weight:600; color:var(--ink);
      outline:none; box-sizing:border-box; resize:none;
    }
    .form-field:focus { border-color:var(--accent); }
    .btn-danger { margin:16px 24px calc(16px + env(safe-area-inset-bottom,0px)); padding:16px;
      border-radius:var(--r-lg); background:var(--raspberry); color:#fff; border:none;
      font:inherit; font-size:15px; font-weight:900; cursor:pointer; }
  </style>
</head>
<body>
<div class="app">
  <main class="screen">
    <header class="edit-topbar">
      <a class="back-btn" href="settings.html"><i class="ph ph-arrow-left"></i></a>
      <h1 class="page-title">계정 탈퇴</h1>
    </header>

    <div class="warn-card">
      <div class="warn-title"><i class="ph ph-warning-octagon"></i>탈퇴 전 확인해 주세요</div>
      <div class="warn-body">
        탈퇴 시 다음 정보가 영향을 받아요:
        <ul>
          <li>30일 후 계정과 등록한 반려동물 정보가 영구 삭제됩니다</li>
          <li>모든 기기에서 로그아웃되며 같은 이메일로 30일 이내 재가입이 제한됩니다</li>
          <li>진행 중인 매칭이 있다면 봉사자/요청자에게 통보됩니다</li>
        </ul>
      </div>
    </div>

    <form id="delete-form">
      <div>
        <label class="form-label" for="delete-password">현재 비밀번호 <span style="color:var(--raspberry)">*</span></label>
        <input class="form-field" type="password" id="delete-password" autocomplete="current-password" required style="margin-top:6px" />
      </div>
      <div>
        <label class="form-label" for="delete-reason">탈퇴 사유 (선택)</label>
        <textarea class="form-field" id="delete-reason" rows="4" maxlength="500"
          placeholder="더 나은 서비스를 위해 의견을 들려주세요" style="margin-top:6px"></textarea>
      </div>
    </form>

    <button class="btn-danger" type="submit" form="delete-form">탈퇴하기</button>
  </main>
</div>
<script src="vendor/phosphor/phosphor.js"></script>
<script src="preview-app.js"></script>
<script>document.addEventListener("DOMContentLoaded", () => PreviewApp.bootAccountDelete());</script>
</body>
</html>
