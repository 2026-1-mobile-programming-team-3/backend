<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F5EDDE" />
  <title>시흥가개 — 반려동물</title>
  <link rel="stylesheet" as="style" crossorigin href="vendor/suit/SUIT-Variable.css" />
  <link rel="stylesheet" href="styles-v3.css" />
  <style>
    .edit-topbar { display:flex; align-items:center; gap:12px; padding:18px 24px 12px; }
    .back-btn { width:36px; height:36px; border-radius:12px; background:var(--card); border:1px solid var(--line);
      display:flex; align-items:center; justify-content:center; text-decoration:none; color:var(--ink-soft); }
    .back-btn i { font-size:18px; }
    .page-title { font-size:18px; font-weight:900; letter-spacing:-0.04em; color:var(--ink); flex:1; text-align:center; padding-right:36px; }

    /* 미리보기 카드 */
    .preview-card {
      margin:0 24px 24px; padding:16px 18px;
      background: linear-gradient(135deg, #fff 0%, var(--accent-soft) 200%);
      border-radius: var(--r-xl); border: 1px solid rgba(208,138,78,0.18);
      display:flex; align-items:center; gap:16px; box-shadow: var(--shadow-sm);
    }
    .preview-icon-wrap {
      width:56px; height:56px; border-radius:16px;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      font-size:30px;
    }
    .preview-icon-wrap.dog { background: var(--accent-soft); color: var(--accent); }
    .preview-icon-wrap.cat { background: var(--raspberry-soft); color: var(--raspberry); }
    .preview-icon-wrap.other { background: var(--sand-soft); color: var(--sand); }
    .preview-info { flex:1; min-width:0; }
    .preview-eyebrow { font-size:10.5px; font-weight:800; color:var(--ink-mute); letter-spacing:0.08em; text-transform:uppercase; }
    .preview-name { font-size:17px; font-weight:900; color:var(--ink); letter-spacing:-0.035em; margin-top:2px; }
    .preview-meta { font-size:12.5px; font-weight:700; color:var(--ink-mute); margin-top:3px; }

    /* 섹션 카드 */
    .section-label { font-size:12px; font-weight:900; color:var(--ink-soft); letter-spacing:-0.02em; padding:0 24px 8px; }
    .section-card {
      margin:0 24px 16px; background:var(--card); border:1px solid var(--line);
      border-radius:var(--r-xl); overflow:hidden; box-shadow:var(--shadow-xs);
    }
    .field-row {
      display:flex; align-items:center; padding:14px 18px;
      border-bottom:1px solid var(--line);
      gap:12px;
    }
    .field-row:last-child { border-bottom:none; }
    .field-label { font-size:14px; font-weight:800; color:var(--ink); flex-shrink:0; min-width:64px; letter-spacing:-0.02em; }
    .field-input {
      flex:1; min-width:0;
      padding:0; border:none; background:transparent;
      font:inherit; font-size:14px; font-weight:600; color:var(--ink);
      outline:none; text-align:right;
    }
    .field-input::placeholder { color:var(--ink-mute); font-weight:500; }

    /* chip 그룹 */
    .chip-group { display:flex; gap:8px; margin-left:auto; }
    .pf-chip {
      padding:7px 14px; border-radius:999px;
      border:1.5px solid var(--line); background:var(--card);
      font:inherit; font-size:12.5px; font-weight:700; color:var(--ink-soft);
      cursor:pointer; transition:background 0.18s, border-color 0.18s, color 0.18s;
    }
    .pf-chip:active { transform:scale(0.95); }
    .pf-chip.active { background:var(--ink); color:#fff; border-color:var(--ink); }

    /* 나이 stepper */
    .age-row { display:flex; align-items:center; gap:6px; }
    .age-stepper { display:inline-flex; align-items:center; gap:0; border:1.5px solid var(--line); border-radius:999px; overflow:hidden; }
    .age-btn { width:32px; height:32px; background:var(--card); border:none; color:var(--ink); cursor:pointer; font-size:16px; font-weight:900; }
    .age-btn:active { background:var(--bg-2); }
    .age-value { padding:0 10px; min-width:30px; text-align:center; font-size:14px; font-weight:900; color:var(--ink); }

    /* 토글 */
    .toggle-row { padding:14px 18px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--line); }
    .toggle-row:last-child { border-bottom:none; }
    .toggle { position:relative; width:46px; height:26px; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle .slider { position:absolute; cursor:pointer; inset:0; background:#ccc; border-radius:999px; transition:0.2s; }
    .toggle .slider::before { content:''; position:absolute; left:3px; top:3px; width:20px; height:20px; background:#fff; border-radius:50%; transition:0.2s; }
    .toggle input:checked + .slider { background:var(--accent); }
    .toggle input:checked + .slider::before { transform:translateX(20px); }

    /* 메모 카드 */
    .memo-card {
      margin:0 24px 16px; padding:16px 18px;
      background:var(--card); border:1px solid var(--line); border-radius:var(--r-xl);
      box-shadow:var(--shadow-xs);
    }
    .memo-label { font-size:13px; font-weight:900; color:var(--ink); margin-bottom:8px; letter-spacing:-0.025em; }
    .memo-input {
      width:100%; border:none; resize:none; outline:none;
      font:inherit; font-size:13.5px; font-weight:600; color:var(--ink);
      background:transparent; line-height:1.6; min-height:70px;
    }
    .memo-input::placeholder { color:var(--ink-mute); }
    .memo-count { font-size:11px; color:var(--ink-mute); text-align:right; margin-top:4px; font-weight:600; }

    /* 액션 */
    .form-actions { padding:8px 24px calc(24px + env(safe-area-inset-bottom,0px)); display:flex; flex-direction:column; gap:10px; }
    .btn-primary {
      width:100%; padding:16px; border-radius:var(--r-lg);
      background:var(--accent); color:#fff; border:none;
      font:inherit; font-size:15px; font-weight:900; cursor:pointer;
      letter-spacing:-0.02em; transition:transform 0.18s var(--spring);
    }
    .btn-primary:active { transform:scale(0.97); }
    .btn-primary:disabled { opacity:0.5; }
    .btn-danger {
      width:100%; padding:14px; border-radius:var(--r-lg);
      background:var(--card); color:var(--raspberry); border:1.5px solid rgba(240,66,112,0.18);
      font:inherit; font-size:14px; font-weight:800; cursor:pointer;
    }
    .btn-danger:active { background:var(--raspberry-soft); }
  </style>
</head>
<body>
<div class="app">
  <main class="screen">
    <header class="edit-topbar">
      <a class="back-btn" href="my.html"><i class="ph ph-arrow-left"></i></a>
      <h1 class="page-title" id="form-title">반려동물 추가</h1>
    </header>

    <!-- 미리보기 -->
    <div class="preview-card">
      <div class="preview-icon-wrap dog">
        <i id="preview-icon" class="ph ph-dog"></i>
      </div>
      <div class="preview-info">
        <div class="preview-eyebrow">미리보기</div>
        <div class="preview-name" id="preview-name">이름을 입력하세요</div>
        <div class="preview-meta" id="preview-meta">강아지 · 1살</div>
      </div>
    </div>

    <form id="pet-form">
      <!-- 기본 정보 -->
      <div class="section-label">기본 정보</div>
      <div class="section-card">
        <div class="field-row">
          <span class="field-label">이름</span>
          <input class="field-input" type="text" id="pet-name" placeholder="예: 파댕이" maxlength="30" required />
        </div>
        <div class="field-row">
          <span class="field-label">종류</span>
          <div class="chip-group">
            <button type="button" class="pf-chip active" data-species="DOG">강아지</button>
            <button type="button" class="pf-chip" data-species="CAT">고양이</button>
            <button type="button" class="pf-chip" data-species="OTHER">기타</button>
          </div>
        </div>
        <div class="field-row">
          <span class="field-label">품종</span>
          <input class="field-input" type="text" id="pet-breed" placeholder="예: 말티즈 (선택)" maxlength="30" />
        </div>
      </div>

      <!-- 상세 정보 -->
      <div class="section-label">상세 정보</div>
      <div class="section-card">
        <div class="field-row">
          <span class="field-label">나이</span>
          <div class="age-row" style="margin-left:auto">
            <div class="age-stepper">
              <button type="button" class="age-btn" id="age-minus">−</button>
              <span class="age-value" id="age-value">1</span>
              <button type="button" class="age-btn" id="age-plus">+</button>
            </div>
            <div class="chip-group">
              <button type="button" class="pf-chip" data-age-unit="months">개월</button>
              <button type="button" class="pf-chip active" data-age-unit="years">살</button>
            </div>
          </div>
        </div>
        <div class="field-row">
          <span class="field-label">성별</span>
          <div class="chip-group">
            <button type="button" class="pf-chip" data-gender="FEMALE">암컷</button>
            <button type="button" class="pf-chip" data-gender="MALE">수컷</button>
            <button type="button" class="pf-chip active" data-gender="UNKNOWN">모름</button>
          </div>
        </div>
        <div class="field-row">
          <span class="field-label">체중</span>
          <input class="field-input" type="number" id="pet-weight" placeholder="예: 3.2" step="0.1" min="0" max="200" />
          <span style="font-size:13px; font-weight:700; color:var(--ink-mute); margin-left:4px">kg</span>
        </div>
        <div class="toggle-row">
          <span class="field-label" style="flex:1">중성화</span>
          <label class="toggle">
            <input type="checkbox" id="pet-neutered" />
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- 특징 -->
      <div class="section-label">특징 및 주의사항</div>
      <div class="memo-card">
        <textarea class="memo-input" id="pet-memo"
          placeholder="알러지, 질환, 성격 등 참고할 만한 내용을 자유롭게 적어주세요." maxlength="300"></textarea>
        <div class="memo-count"><span id="memo-count">0 / 300</span></div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">저장하기</button>
        <button type="button" class="btn-danger" id="btn-delete" hidden>반려동물 삭제</button>
      </div>
    </form>

    <div style="height:env(safe-area-inset-bottom,0px)"></div>
  </main>
</div>
<script src="vendor/phosphor/phosphor.js"></script>
<script src="preview-app.js"></script>
<script>document.addEventListener("DOMContentLoaded", () => PreviewApp.bootPetForm());</script>
</body>
</html>
