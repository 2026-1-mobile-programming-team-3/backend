<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F5EDDE" />
  <title>시흥가개 — 미리보기 로그인</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css" />
  <link rel="stylesheet" href="styles-v3.css" />
  <style>
    .login-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 28px;
      gap: 24px;
    }
    .login-title { font-size: 24px; font-weight: 900; letter-spacing: -0.04em; color: var(--ink); }
    .login-sub { font-size: 13px; color: var(--ink-mute); margin-top: -16px; line-height: 1.55; }
    .login-form { display: flex; flex-direction: column; gap: 12px; }
    .login-form label { font-size: 12px; font-weight: 700; color: var(--ink-mute); }
    .login-form input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 14px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
      font-family: inherit;
    }
    .login-form input:focus { border-color: var(--accent); background: var(--card); }
    .login-form button[type=submit] {
      padding: 13px;
      border-radius: 999px;
      background: var(--accent); color: #fff;
      font-size: 14px; font-weight: 900;
      border: none; cursor: pointer;
      margin-top: 8px;
    }
    .login-reuse {
      padding: 12px;
      border-radius: 12px;
      background: var(--mint-dim);
      color: var(--mint);
      font-size: 13px; font-weight: 800;
      border: 1px solid rgba(122,155,110,0.3);
      cursor: pointer;
    }
    .login-hint {
      font-size: 11.5px;
      color: var(--ink-ghost);
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body data-tab="login">
  <main class="app">
    <div class="login-wrap">
      <div>
        <div class="login-title">시흥가개 미리보기</div>
        <p class="login-sub">이 탭에서만 유효한 로그인입니다. 다른 탭과 분리됩니다 — 두 브라우저로 다른 계정 동시 시험 가능.</p>
      </div>

      <button id="reuse-console-btn" class="login-reuse" type="button" style="display:none">
        콘솔 계정으로 이 탭에서 로그인
      </button>

      <form id="login-form" class="login-form">
        <div>
          <label for="login-email">이메일</label>
          <input id="login-email" name="email" type="email" required autocomplete="username" />
        </div>
        <div>
          <label for="login-password">비밀번호</label>
          <input id="login-password" name="password" type="password" required autocomplete="current-password" />
        </div>
        <button type="submit">로그인</button>
      </form>

      <div class="login-hint">로그아웃: 이 탭을 닫으면 자동으로 해제됩니다 (sessionStorage).</div>
    </div>
  </main>
  <script src="preview-app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // 콘솔(localStorage)에 토큰이 있고 세션엔 없으면 재사용 버튼 노출
      const localAccess = localStorage.getItem("sg_access_token");
      const sessAccess  = sessionStorage.getItem("sg_access_token");
      if (localAccess && !sessAccess) {
        document.getElementById("reuse-console-btn").style.display = "block";
      }
      document.getElementById("reuse-console-btn").addEventListener("click", () => {
        sessionStorage.setItem("sg_access_token", localAccess);
        const localRefresh = localStorage.getItem("sg_refresh_token");
        if (localRefresh) sessionStorage.setItem("sg_refresh_token", localRefresh);
        location.href = "/preview/";
      });

      document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;
        try {
          const res = await fetch("/api/v1/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || `로그인 실패 (${res.status})`);
          sessionStorage.setItem("sg_access_token", data.access_token);
          sessionStorage.setItem("sg_refresh_token", data.refresh_token);
          Toast.ok("로그인 완료");
          setTimeout(() => { location.href = "/preview/"; }, 500);
        } catch (err) {
          Toast.error(err.message);
        }
      });
    });
  </script>
</body>
</html>
