<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F5EDDE" />
  <title>시흥가개 — 매칭 상세</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css" />
  <link rel="stylesheet" href="styles-v3.css" />
  <style>
    .md-topbar {
      display:flex; align-items:center; justify-content:space-between; padding:18px 24px 12px;
    }
    .back-btn, .icon-btn { width:36px; height:36px; border-radius:12px; background:var(--card); border:1px solid var(--line);
      display:flex; align-items:center; justify-content:center; text-decoration:none; color:var(--ink-soft); cursor:pointer; font:inherit; }
    .back-btn i, .icon-btn i { font-size:18px; }
    .md-actions-top { display:flex; gap:8px; }

    /* 상태 + D-day 헤더 */
    .md-status-row {
      margin:0 24px 14px;
      padding:10px 16px;
      border-radius:999px;
      background:var(--raspberry-soft);
      color:var(--raspberry);
      display:flex; align-items:center; justify-content:space-between;
      font-size:13px; font-weight:900;
    }
    .md-status-row[data-s="MATCHING"] { background:var(--accent-soft); color:var(--accent); }
    .md-status-row[data-s="PROGRESS"] { background:var(--mint-soft); color:var(--mint); }
    .md-status-row[data-s="DONE"]     { background:rgba(30,18,10,0.06); color:var(--ink-mute); }

    .md-title { padding:0 24px 18px; font-size:24px; font-weight:900; letter-spacing:-0.04em; color:var(--ink); line-height:1.3; }

    /* 상세 카드 (일정/시간/목적지/펫/메모 5필드) */
    .md-info-card {
      margin:0 24px 16px; padding:8px 4px;
      background:var(--card); border:1px solid var(--line); border-radius:var(--r-xl);
      box-shadow:var(--shadow-md);
    }
    .md-info-row { display:flex; align-items:flex-start; gap:14px; padding:12px 16px; border-bottom:1px solid var(--line); }
    .md-info-row:last-child { border-bottom:none; }
    .md-info-icon {
      width:34px; height:34px; border-radius:11px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
    }
    .md-info-icon i { font-size:17px; }
    .md-info-icon.date { background:var(--raspberry-soft); color:var(--raspberry); }
    .md-info-icon.time { background:var(--accent-soft); color:var(--accent); }
    .md-info-icon.dest { background:var(--mint-soft); color:var(--mint); }
    .md-info-icon.pet  { background:var(--sand-soft);  color:var(--sand);  }
    .md-info-icon.memo { background:rgba(30,18,10,0.06); color:var(--ink-mute); }
    .md-info-body { flex:1; min-width:0; }
    .md-info-label { font-size:11.5px; font-weight:800; color:var(--ink-mute); letter-spacing:-0.01em; }
    .md-info-value { font-size:14px; font-weight:800; color:var(--ink); margin-top:2px; letter-spacing:-0.025em; word-break:keep-all; }
    .md-info-pet-chip { display:inline-flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
    .md-info-pet-chip span {
      padding:4px 10px; border-radius:999px; background:var(--sand-soft); color:var(--sand);
      font-size:11.5px; font-weight:800;
    }

    /* 거리 인디케이터 */
    .md-distance {
      margin:0 24px 12px; padding:14px 18px;
      background:var(--card); border:1px solid var(--line); border-radius:var(--r-xl);
      display:flex; align-items:center; gap:10px;
      font-size:13px; font-weight:700; color:var(--ink-soft); box-shadow:var(--shadow-xs);
    }
    .md-distance .from, .md-distance .to {
      display:inline-flex; align-items:center; gap:4px; color:var(--ink-mute);
    }
    .md-distance .from i { color:var(--raspberry); }
    .md-distance .to i { color:var(--mint); }
    .md-distance .km { margin-left:auto; font-weight:900; color:var(--accent); }

    /* 미니맵 */
    .md-minimap {
      margin:0 24px 18px; height:160px; border-radius:var(--r-xl); overflow:hidden;
      border:1px solid var(--line); position:relative;
      background:linear-gradient(135deg, var(--mint-soft) 0%, #B8D9D9 50%, var(--accent-soft) 100%);
      display:flex; align-items:center; justify-content:center;
    }
    .md-minimap-pins { display:flex; align-items:center; gap:64px; }
    .md-minimap-pins i { font-size:30px; filter:drop-shadow(0 2px 4px rgba(30,18,10,0.22)); }
    .md-minimap-pins .pin-start { color:var(--raspberry); }
    .md-minimap-pins .pin-end { color:var(--mint); }
    .md-minimap-pins .pin-line {
      width:64px; height:2px; background:rgba(30,18,10,0.2); margin:0 -64px; align-self:center;
    }
    .md-minimap-cta {
      position:absolute; left:14px; bottom:14px;
      padding:7px 14px; border-radius:999px; background:#fff;
      font-size:11.5px; font-weight:800; color:var(--ink); box-shadow:var(--shadow-sm);
      display:inline-flex; align-items:center; gap:4px;
    }
    .md-minimap-cta i { font-size:13px; }

    /* 본문 */
    .md-section-title { padding:0 24px 10px; font-size:14px; font-weight:900; color:var(--ink); letter-spacing:-0.025em; }
    .md-content {
      margin:0 24px 20px; padding:16px 18px;
      background:var(--card); border:1px solid var(--line); border-radius:var(--r-xl);
      font-size:14px; font-weight:600; line-height:1.7; color:var(--ink-soft);
      word-break:keep-all;
    }

    /* 신청자 카드 */
    .applicants-section { margin-bottom:20px; }
    .applicants-head {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 24px 10px;
    }
    .applicants-head-title { display:inline-flex; align-items:center; gap:6px; font-size:15px; font-weight:900; color:var(--ink); letter-spacing:-0.03em; }
    .applicants-head-title i { font-size:17px; color:var(--accent); }
    .applicants-count { font-size:12.5px; font-weight:800; color:var(--accent); }
    .applicant-row {
      margin:0 24px 10px; padding:14px 16px;
      background:var(--card); border:1px solid var(--line); border-radius:var(--r-xl);
      box-shadow:var(--shadow-sm);
    }
    .ap-head { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
    .ap-avatar { width:40px; height:40px; border-radius:50%; background:var(--mint-soft);
      display:flex; align-items:center; justify-content:center; color:var(--mint); font-size:18px; flex-shrink:0; }
    .ap-info { flex:1; min-width:0; }
    .app-nickname { font-size:14.5px; font-weight:900; color:var(--ink); letter-spacing:-0.025em; }
    .app-status { font-size:11.5px; font-weight:700; color:var(--ink-mute); margin-top:2px; }
    .app-message {
      font-size:12.5px; font-weight:600; color:var(--ink-soft); line-height:1.6;
      padding:10px 12px; background:var(--bg-2); border-radius:var(--r-md); margin-bottom:10px;
      word-break:keep-all;
    }
    .app-actions { display:flex; gap:8px; }
    .btn-chat { padding:9px 14px; border-radius:999px; background:var(--card); border:1.5px solid var(--line); color:var(--ink-soft); font:inherit; font-size:12.5px; font-weight:800; cursor:pointer; }
    .btn-chat:active { background:var(--bg-2); }
    .btn-accept { padding:9px 18px; border-radius:999px; background:var(--raspberry); color:#fff; border:none; font:inherit; font-size:12.5px; font-weight:900; cursor:pointer; display:inline-flex; align-items:center; gap:4px; }
    .btn-accept i { font-size:13px; }
    .btn-reject { padding:9px 14px; border-radius:999px; background:var(--card); border:1.5px solid var(--line); color:var(--ink-mute); font:inherit; font-size:12.5px; font-weight:800; cursor:pointer; }

    /* 작성자 액션 (수정/삭제/완료) */
    .owner-actions {
      margin:8px 24px 16px; display:flex; gap:8px; flex-wrap:wrap;
    }
    .owner-actions button {
      flex:1; padding:12px; border-radius:var(--r-lg);
      background:var(--card); border:1.5px solid var(--line);
      font:inherit; font-size:13px; font-weight:800; color:var(--ink-soft); cursor:pointer;
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
    }
    .owner-actions #btn-delete-match { color:var(--raspberry); border-color:rgba(240,66,112,0.18); }
    .owner-actions #btn-finish-match { background:var(--mint); color:#fff; border-color:var(--mint); }

    /* 신청자(나) 하단 CTA */
    .md-cta-wrap {
      padding:14px 24px calc(14px + env(safe-area-inset-bottom,0px));
      background:var(--bg); border-top:1px solid var(--line);
      position:sticky; bottom:0;
      display:flex; gap:10px;
    }
    .btn-cta {
      flex:1; padding:16px; border-radius:var(--r-lg);
      background:var(--raspberry); color:#fff; border:none;
      font:inherit; font-size:15px; font-weight:900; cursor:pointer;
      letter-spacing:-0.02em;
    }
    .btn-cta:active { transform:scale(0.97); }
    .btn-cta:disabled { opacity:0.5; }
    .btn-cta.chat { flex:0 0 56px; background:var(--accent-dim); color:var(--accent); }
    .btn-cta.review { background:var(--mint); }
    .btn-report-floating {
      position:absolute; right:24px; top:18px;
      width:36px; height:36px; border-radius:50%; background:transparent; border:none;
      color:var(--ink-mute); cursor:pointer;
    }
  </style>
</head>
<body>
<div class="app">
  <main class="screen">
    <header class="md-topbar">
      <a class="back-btn" href="match.html"><i class="ph ph-arrow-left"></i></a>
      <div class="md-actions-top">
        <button class="icon-btn" type="button" id="btn-bookmark" title="저장"><i class="ph ph-bookmark"></i></button>
        <button class="icon-btn" type="button" id="btn-share" title="공유"
          onclick="if(navigator.share) navigator.share({title:document.title, url:location.href}); else { navigator.clipboard?.writeText(location.href); Toast?.ok('링크가 복사되었어요'); }">
          <i class="ph ph-share-network"></i>
        </button>
        <button class="icon-btn" type="button" id="btn-report-match" title="신고" hidden><i class="ph ph-warning-circle"></i></button>
      </div>
    </header>

    <!-- 상태 + D-day 행 -->
    <div class="md-status-row" data-bind-attr="data-s:{status}">
      <span data-bind="applications_count_label">봉사자 모집 중</span>
      <span data-bind="dday_label">D-2</span>
    </div>

    <h1 class="md-title" data-bind="title">—</h1>

    <!-- 5필드 정보 카드 -->
    <div class="md-info-card">
      <div class="md-info-row">
        <span class="md-info-icon date"><i class="ph ph-calendar"></i></span>
        <div class="md-info-body">
          <div class="md-info-label">일정</div>
          <div class="md-info-value" data-bind="desired_date_label">—</div>
        </div>
      </div>
      <div class="md-info-row">
        <span class="md-info-icon time"><i class="ph ph-clock"></i></span>
        <div class="md-info-body">
          <div class="md-info-label">시간</div>
          <div class="md-info-value" data-bind="desired_time_label">시간 미정</div>
        </div>
      </div>
      <div class="md-info-row">
        <span class="md-info-icon dest"><i class="ph ph-map-pin"></i></span>
        <div class="md-info-body">
          <div class="md-info-label">목적지</div>
          <div class="md-info-value" data-bind="address_label">—</div>
        </div>
      </div>
      <div class="md-info-row">
        <span class="md-info-icon pet"><i class="ph ph-paw-print"></i></span>
        <div class="md-info-body">
          <div class="md-info-label">반려동물</div>
          <div class="md-info-pet-chip">
            <span data-bind="pet_name">—</span>
            <span data-bind="pet_species">—</span>
            <span data-bind="pet_neutered_label" data-bind-show="pet_neutered_label"></span>
          </div>
        </div>
      </div>
      <div class="md-info-row">
        <span class="md-info-icon memo"><i class="ph ph-chat-circle"></i></span>
        <div class="md-info-body">
          <div class="md-info-label">요청 메모</div>
          <div class="md-info-value" data-bind="content" style="font-weight:600; line-height:1.6">—</div>
        </div>
      </div>
    </div>

    <!-- 거리 인디케이터 -->
    <div class="md-distance">
      <span class="from"><i class="ph-fill ph-map-pin"></i><span data-fill="region">시흥</span> 자택</span>
      <i class="ph ph-arrow-right" style="color:var(--ink-mute)"></i>
      <span class="to"><i class="ph-fill ph-map-pin"></i><span data-bind="address_label">—</span></span>
    </div>

    <!-- 미니맵 (카카오 SDK 연동 예정) -->
    <div class="md-minimap">
      <div class="md-minimap-pins">
        <i class="ph-fill ph-map-pin pin-start"></i>
        <span class="pin-line"></span>
        <i class="ph-fill ph-map-pin pin-end"></i>
      </div>
      <a class="md-minimap-cta" href="map.html"><i class="ph ph-map-trifold"></i>지도에서 보기</a>
    </div>

    <!-- 작성자 액션 (수정/삭제/완료) -->
    <div class="owner-actions" id="owner-actions" hidden>
      <button type="button" id="btn-edit-match"><i class="ph ph-pencil-simple"></i>수정</button>
      <button type="button" id="btn-delete-match"><i class="ph ph-trash"></i>삭제</button>
      <button type="button" id="btn-finish-match" hidden><i class="ph ph-check-circle"></i>완료 처리</button>
    </div>

    <!-- 신청자 목록 (작성자만) -->
    <section id="apps-section" class="applicants-section" hidden>
      <div class="applicants-head">
        <span class="applicants-head-title"><i class="ph ph-users-three"></i>신청한 봉사자</span>
        <span class="applicants-count"><span id="apps-count">0</span>명</span>
      </div>
      <template id="tmpl-applicant">
        <div class="applicant-row">
          <div class="ap-head">
            <div class="ap-avatar"><i class="ph ph-user"></i></div>
            <div class="ap-info">
              <div class="app-nickname">—</div>
              <div class="app-status">—</div>
            </div>
          </div>
          <div class="app-message">메모 없음</div>
          <div class="app-actions">
            <button class="btn-chat" type="button"><i class="ph ph-chat-circle-dots"></i> 채팅</button>
            <button class="btn-accept" type="button"><i class="ph ph-check"></i>수락</button>
            <button class="btn-reject" type="button">거절</button>
          </div>
        </div>
      </template>
      <div id="apps-list"></div>
    </section>

    <div style="height:24px"></div>
  </main>

  <!-- 신청자(나)용 하단 CTA -->
  <div class="md-cta-wrap">
    <button class="btn-cta chat" id="btn-chat" hidden type="button"><i class="ph ph-chat-circle-dots"></i></button>
    <button class="btn-cta review" id="btn-review-match" hidden type="button">후기 작성하기</button>
    <button class="btn-cta" id="btn-apply" hidden type="button">봉사 신청하기</button>
  </div>
</div>
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<script src="preview-app.js"></script>
<script>document.addEventListener("DOMContentLoaded", () => PreviewApp.bootMatchDetail());</script>
</body>
</html>
