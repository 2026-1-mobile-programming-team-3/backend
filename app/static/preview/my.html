<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F5EDDE" />
  <title>시흥가개 — 마이</title>
  <link rel="stylesheet" as="style" crossorigin href="vendor/suit/SUIT-Variable.css" />
  <link rel="stylesheet" href="styles-v3.css" />
  <style>
    /* ── topbar ── */
    .topbar { align-items: flex-end; }

    /* ── 프로필 카드 ── */
    .profile-card {
      margin: 18px 24px 0;
      padding: 20px 20px;
      background: linear-gradient(135deg, #fff 0%, var(--accent-soft) 200%);
      border-radius: var(--r-2xl);
      border: 1px solid rgba(208,138,78,0.16);
      box-shadow: var(--shadow-lg);
      display: flex; align-items: center; gap: 16px;
      transition: transform 0.2s var(--spring);
    }
    .profile-card:active { transform: scale(0.985); }
    .profile-avatar {
      width: 62px; height: 62px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, #E8A870 100%);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: #fff; font-size: 28px;
      border: 3px solid #fff;
      box-shadow: 0 4px 16px rgba(208,138,78,0.30);
      position: relative;
    }
    .profile-avatar i { font-size: 28px; }
    .profile-badge {
      position: absolute; bottom: -2px; right: -2px;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--mint); border: 2.5px solid #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .profile-badge i { font-size: 9px; color: #fff; stroke-width: 2.5; }
    .profile-info { flex: 1; min-width: 0; }
    .profile-name { font-size: 18px; font-weight: 900; letter-spacing: -0.04em; color: var(--ink); }
    .profile-region { font-size: 12.5px; font-weight: 700; color: var(--ink-mute); display: inline-flex; align-items: center; gap: 3px; margin-top: 3px; }
    .profile-region i { font-size: 12px; color: var(--accent); }
    .profile-edit { padding: 8px 16px; background: rgba(30,18,10,0.06); border: 1px solid var(--line); border-radius: 999px; font: inherit; font-size: 12.5px; font-weight: 800; color: var(--ink-soft); cursor: pointer; white-space: nowrap; transition: background 0.15s; }
    .profile-edit:active { background: rgba(30,18,10,0.10); }

    /* ── 반려동물 ── */
    .section-label { font-size: 11px; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-mute); padding: 24px 24px 10px; }

    /* 가로 스크롤 카드 */
    .pets-scroll {
      display: flex; gap: 12px;
      padding: 0 24px 4px;
      overflow-x: auto; scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .pets-scroll::-webkit-scrollbar { display: none; }

    .pet-v-card {
      flex-shrink: 0; width: 96px;
      padding: 14px 8px 12px;
      border-radius: 20px;
      border: 2px solid var(--line);
      background: var(--card);
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      position: relative; cursor: pointer;
      transition: border-color 0.18s, transform 0.18s var(--spring);
    }
    .pet-v-card:active { transform: scale(0.96); }
    .pet-v-card.selected { border-color: var(--accent); }

    .pet-v-check {
      position: absolute; top: 7px; right: 7px;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
    }
    .pet-v-icon {
      width: 54px; height: 54px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 2px;
    }
    .pet-v-icon.cat { background: var(--raspberry-soft); color: var(--raspberry); }
    .pet-v-icon.dog { background: var(--accent-soft); color: var(--accent); }
    .pet-v-name { font-size: 13px; font-weight: 900; letter-spacing: -0.03em; color: var(--ink); text-align: center; }
    .pet-v-info { font-size: 10.5px; font-weight: 600; color: var(--ink-mute); text-align: center; line-height: 1.3; }

    .pet-v-add {
      flex-shrink: 0; width: 96px; min-height: 148px;
      border-radius: 20px;
      border: 2px dashed var(--line-mid);
      background: transparent;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      cursor: pointer; color: var(--ink-mute);
      font: inherit; font-size: 11.5px; font-weight: 700; text-align: center; line-height: 1.5;
      transition: background 0.15s, transform 0.18s var(--spring);
    }
    .pet-v-add:active { background: var(--bg-2); transform: scale(0.96); }
    .pet-v-add i { font-size: 22px; color: var(--ink-ghost); }

    /* ── 활동 통계 ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 10px;
      padding: 0 24px;
    }
    .stat-card {
      background: var(--card);
      border-radius: var(--r-xl);
      border: 1px solid var(--line);
      padding: 16px 14px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      text-decoration: none; color: inherit;
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s var(--spring), box-shadow 0.2s var(--ease-out);
    }
    .stat-card:active { transform: scale(0.94); box-shadow: var(--shadow-xs); }
    .stat-num { font-size: 26px; font-weight: 900; letter-spacing: -0.05em; font-variant-numeric: tabular-nums; animation: numCount 0.5s var(--spring) 0.2s both; }
    .stat-label { font-size: 11px; font-weight: 700; color: var(--ink-mute); letter-spacing: -0.01em; text-align: center; }

    /* ── 봉사 뱃지 섹션 ── */
    .badge-section {
      margin: 0 24px;
      padding: 18px 20px;
      background: linear-gradient(135deg, #fff 0%, var(--mint-soft) 160%);
      border-radius: var(--r-xl);
      border: 1px solid rgba(122,155,110,0.18);
      box-shadow: var(--shadow-md);
    }
    .badge-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .badge-head-title { font-size: 14px; font-weight: 900; letter-spacing: -0.03em; color: var(--ink); display: flex; align-items: center; gap: 6px; }
    .badge-head-title i { font-size: 15px; color: var(--mint); }
    .badge-head-link { font-size: 12px; font-weight: 700; color: var(--mint); display: flex; align-items: center; gap: 3px; }
    .badge-head-link i { font-size: 12px; }

    .badge-progress { margin-bottom: 14px; }
    .bp-labels { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .bp-current { font-size: 13px; font-weight: 900; color: var(--ink); letter-spacing: -0.03em; }
    .bp-current em { color: var(--mint); }
    .bp-next { font-size: 11.5px; font-weight: 700; color: var(--ink-mute); }
    .bp-bar { height: 7px; background: rgba(30,18,10,0.08); border-radius: 999px; overflow: hidden; }
    .bp-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--mint), var(--sand)); width: 60%; transition: width 0.8s var(--ease-out); }

    .badge-grid { display: flex; gap: 10px; }
    .badge-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px;
      padding: 10px 8px; border-radius: var(--r-md);
      background: rgba(255,255,255,0.70); border: 1px solid rgba(255,255,255,0.8);
      cursor: pointer; transition: transform 0.18s var(--spring);
    }
    .badge-item:active { transform: scale(0.94); }
    .badge-item.locked { opacity: 0.40; }
    .badge-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .badge-icon i { font-size: 20px; stroke-width: 1.8; }
    .badge-name { font-size: 10.5px; font-weight: 800; color: var(--ink); letter-spacing: -0.01em; text-align: center; }
    .badge-count { font-size: 10px; font-weight: 700; color: var(--ink-mute); }

    /* ── 메뉴 그룹 ── */
    .menu-group {
      margin: 0 24px 10px;
      background: var(--card);
      border-radius: var(--r-xl);
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .menu-row {
      display: flex; align-items: center; gap: 12px;
      padding: 15px 18px;
      border-bottom: 1px solid var(--line);
      text-decoration: none; color: inherit; cursor: pointer;
      transition: background 0.15s;
    }
    .menu-row:last-child { border-bottom: none; }
    .menu-row:active { background: var(--bg-2); }
    .menu-icon { width: 36px; height: 36px; border-radius: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .menu-icon i { font-size: 17px; stroke-width: 2; }
    .menu-label { flex: 1; font-size: 14.5px; font-weight: 700; color: var(--ink); letter-spacing: -0.025em; }
    .menu-badge { font-size: 11px; font-weight: 900; color: #fff; padding: 3px 8px; border-radius: 999px; }
    .menu-sub { font-size: 12.5px; font-weight: 600; color: var(--ink-mute); }
    .menu-arrow { color: var(--ink-mute); }
    .menu-arrow i { font-size: 17px; }

    /* ── 내 봉사 요청 ── */
    .my-requests {
      display: flex; flex-direction: column; gap: 10px;
      padding: 0 24px;
    }
    .mr-card {
      background: var(--card);
      border-radius: var(--r-xl);
      border: 1px solid var(--line);
      padding: 16px 18px;
      box-shadow: var(--shadow-md);
      text-decoration: none; color: inherit;
      display: block;
      transition: transform 0.2s var(--spring);
    }
    .mr-card:active { transform: scale(0.985); }
    .mr-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .mr-status {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 800;
    }
    .mr-status.pre     { background: var(--raspberry-dim); color: var(--raspberry); }
    .mr-status.matched { background: var(--mint-dim); color: var(--mint); }
    .mr-status.done    { background: rgba(30,18,10,0.06); color: var(--ink-mute); }
    .mr-status-dot {
      width: 6px; height: 6px; border-radius: 50%; background: currentColor;
    }
    .mr-chat-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 999px;
      background: rgba(201,71,106,0.12); color: var(--raspberry);
      font-size: 11.5px; font-weight: 800; cursor: pointer;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201,71,106,0); }
      50% { box-shadow: 0 0 0 4px rgba(201,71,106,0.12); }
    }
    .mr-chat-btn i { font-size: 14px; }
    .mr-applicants {
      display: flex; align-items: center; gap: 5px;
      font-size: 11.5px; font-weight: 700; color: var(--accent);
    }
    .mr-applicants i { font-size: 13px; }
    .mr-matched-vol {
      display: flex; align-items: center; gap: 5px;
      font-size: 11.5px; font-weight: 700; color: var(--mint);
    }
    .mr-matched-vol i { font-size: 13px; }
    .mr-done-label {
      font-size: 11.5px; font-weight: 700; color: var(--ink-mute);
      display: flex; align-items: center; gap: 4px;
    }
    .mr-done-label i { font-size: 13px; }
    .mr-title {
      font-size: 15.5px; font-weight: 900; letter-spacing: -0.035em;
      color: var(--ink); line-height: 1.3; margin-bottom: 8px;
    }
    .mr-info-row {
      display: flex; align-items: center; gap: 12px;
      font-size: 12.5px; font-weight: 600; color: var(--ink-mute);
      margin-bottom: 9px; flex-wrap: wrap;
    }
    .mr-info-row span { display: flex; align-items: center; gap: 4px; }
    .mr-info-row i { font-size: 12px; }
    .mr-dest {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12.5px; font-weight: 700; color: var(--ink-soft);
      padding: 6px 12px 6px 10px; background: var(--bg-2); border-radius: 999px;
      max-width: 100%;
    }
    .mr-dest i { font-size: 13px; color: var(--raspberry); flex-shrink: 0; }
    .mr-dest span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mr-new-btn {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      margin: 8px 24px 0;
      padding: 13px 0;
      background: var(--raspberry);
      border-radius: var(--r-lg);
      font: inherit; font-size: 14px; font-weight: 900;
      letter-spacing: -0.025em; color: #fff;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(201,71,106,0.28);
      transition: transform 0.18s var(--spring), box-shadow 0.18s var(--ease-out);
    }
    .mr-new-btn:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(201,71,106,0.18); }
    .mr-new-btn i { font-size: 17px; }

    /* ── 로그아웃 ── */
    .logout-btn {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      margin: 4px 24px 0;
      padding: 14px;
      border-radius: var(--r-lg);
      background: none; border: 1px solid var(--line);
      width: calc(100% - 48px);
      font: inherit; font-size: 13.5px; font-weight: 700;
      color: var(--ink-mute); cursor: pointer;
      transition: background 0.15s;
    }
    .logout-btn:active { background: var(--bg-2); }
    .logout-btn i { font-size: 15px; }
  </style>
</head>
<body data-tab="my">
<div class="app" id="appRoot">
  <main class="screen" id="screen">

    <!-- topbar -->
    <header class="topbar anim-fade-slide-up">
      <div class="tb-left">
        <h1 class="tb-title">마이</h1>
      </div>
      <a class="tb-icon-btn" href="settings.html" aria-label="설정"><i class="ph ph-gear-six"></i></a>
    </header>

    <!-- 프로필 -->
    <div class="profile-card anim-scale-in delay-1">
      <div class="profile-avatar">
        <i class="ph ph-user-circle"></i>
        <div class="profile-badge"><i class="ph ph-paw-print"></i></div>
      </div>
      <div class="profile-info">
        <div class="profile-name" data-bind="nickname">댕댕이주인</div>
        <div class="profile-region"><i class="ph ph-map-pin"></i><span data-bind="region_dong">정왕동</span></div>
      </div>
      <button class="profile-edit" onclick="location.href='profile-edit.html'">편집</button>
    </div>

    <!-- 반려동물 -->
    <div class="section-label anim-fade-slide-up delay-2">내 반려동물</div>
    <div class="pets-scroll anim-fade-slide-up delay-2" id="pets-scroll">
      <button class="pet-v-add" id="btn-add-pet" onclick="location.href='pet-form.html'">
        <i class="ph ph-plus"></i>
        <span>반려동물<br>추가</span>
      </button>
    </div>

    <!-- 활동 통계 -->
    <div class="section-label anim-fade-slide-up delay-3">활동</div>
    <div class="stats-grid anim-fade-slide-up delay-3">
      <a class="stat-card" href="my-matches.html?role=author">
        <div class="stat-num" style="color:var(--raspberry)" data-bind="my_match_count">3</div>
        <div class="stat-label">내 요청</div>
      </a>
      <a class="stat-card" href="my-matches.html?role=applicant">
        <div class="stat-num" style="color:var(--mint)" data-bind="volunteer_completed_count">2</div>
        <div class="stat-label">봉사 참여</div>
      </a>
      <a class="stat-card" href="favorites.html">
        <div class="stat-num" style="color:var(--accent)" data-bind="favorite_count">5</div>
        <div class="stat-label">즐겨찾기</div>
      </a>
    </div>

    <!-- 내 봉사 요청 -->
    <div class="section-label anim-fade-slide-up delay-3" style="display:flex;align-items:center;justify-content:space-between;padding-right:24px">
      내 봉사 요청
      <a href="my-matches.html" style="font-size:11px;font-weight:800;color:var(--raspberry);letter-spacing:.01em;text-decoration:none;display:flex;align-items:center;gap:3px">전체 보기<i class="ph-bold ph-arrow-right" style="font-size:11px"></i></a>
    </div>
    <div class="my-requests anim-fade-slide-up delay-3" data-bind-each="author_matches.items" data-template="#tmpl-author-match"></div>

    <template id="tmpl-author-match">
      <a class="mr-card" data-bind-attr="href:match.html?id={match_id}">
        <div class="mr-header">
          <div class="mr-status pre">
            <div class="mr-status-dot"></div><span data-bind="status">—</span>
          </div>
          <div class="mr-applicants">
            <i class="ph-bold ph-users"></i>신청 <span data-bind="applications_count">0</span>건
          </div>
        </div>
        <div class="mr-title" data-bind="title">—</div>
        <div class="mr-info-row">
          <span><i class="ph ph-calendar-blank"></i><span data-bind="desired_date">—</span></span>
        </div>
        <div class="mr-dest">
          <i class="ph-bold ph-map-pin"></i>
          <span data-bind="address">—</span>
        </div>
      </a>
    </template>

    <!-- 새 요청 작성 버튼 -->
    <a class="mr-new-btn anim-fade-slide-up delay-4" href="match.html">
      <i class="ph-bold ph-plus-circle"></i>새 봉사 요청 작성
    </a>

    <!-- 봉사 활동 (내가 봉사자로 참여한 것) -->
    <div class="section-label anim-fade-slide-up delay-4" style="display:flex;align-items:center;justify-content:space-between;padding-right:24px">
      봉사 활동
      <a href="#" style="font-size:11px;font-weight:800;color:var(--mint);letter-spacing:.01em;text-decoration:none;display:flex;align-items:center;gap:3px">전체 보기<i class="ph-bold ph-arrow-right" style="font-size:11px"></i></a>
    </div>
    <div class="my-requests anim-fade-slide-up delay-4" data-bind-each="applicant_matches.items" data-template="#tmpl-applicant-match"></div>

    <template id="tmpl-applicant-match">
      <a class="mr-card" data-bind-attr="href:match.html?id={match_id}">
        <div class="mr-header">
          <div class="mr-status pre">
            <div class="mr-status-dot"></div><span data-bind="status">—</span>
          </div>
          <div class="mr-done-label">나의 상태: <span data-bind="my_application_status">—</span></div>
        </div>
        <div class="mr-title" data-bind="title">—</div>
        <div class="mr-info-row">
          <span><i class="ph ph-user"></i>요청자 · <span data-bind="author_nickname">—</span></span>
          <span><i class="ph ph-calendar-blank"></i><span data-bind="desired_date">—</span></span>
        </div>
        <div class="mr-dest">
          <i class="ph-bold ph-map-pin"></i>
          <span data-bind="address">—</span>
        </div>
      </a>
    </template>

    <!-- 봉사 뱃지 -->
    <div class="section-label anim-fade-slide-up delay-3">봉사 뱃지</div>
    <div class="badge-section anim-fade-slide-up delay-4">
      <div class="badge-head">
        <div class="badge-head-title"><i class="ph ph-medal"></i>봉사 등급 — <span data-bind="badge.tier">새싹</span></div>
        <a class="badge-head-link" href="#">전체 보기<i class="ph-bold ph-arrow-right"></i></a>
      </div>
      <div class="badge-progress">
        <div class="bp-labels">
          <span class="bp-current"><span data-bind="badge.tier">새싹</span> 등급 · 누적 <em data-bind="badge.count">2</em>건</span>
          <span class="bp-next"><span data-bind="badge.next_tier">꽃</span>까지 <span data-bind="badge.next_threshold">3</span>건</span>
        </div>
        <div class="bp-bar"><div class="bp-fill" data-bind="badge.progress_pct" data-bind-attr="style:width:{badge.progress_pct}%"></div></div>
      </div>
      <div class="badge-grid">
        <div class="badge-item">
          <div class="badge-icon" style="background:rgba(122,155,110,0.18)"><i class="ph ph-plant" style="color:var(--mint)"></i></div>
          <div class="badge-name">새싹</div>
          <div class="badge-count">달성</div>
        </div>
        <div class="badge-item locked">
          <div class="badge-icon" style="background:rgba(208,138,78,0.12)"><i class="ph ph-flower" style="color:var(--accent)"></i></div>
          <div class="badge-name">꽃</div>
          <div class="badge-count">3건 필요</div>
        </div>
        <div class="badge-item locked">
          <div class="badge-icon" style="background:rgba(201,71,106,0.10)"><i class="ph ph-trophy" style="color:var(--raspberry)"></i></div>
          <div class="badge-name">열매</div>
          <div class="badge-count">8건 필요</div>
        </div>
        <div class="badge-item locked">
          <div class="badge-icon" style="background:rgba(30,18,10,0.06)"><i class="ph-fill ph-star" style="color:var(--ink-mute)"></i></div>
          <div class="badge-name">나무</div>
          <div class="badge-count">15건 필요</div>
        </div>
      </div>
    </div>

    <!-- 메뉴 그룹 1 -->

<!-- React/Babel + tweaks-panel JSX 제거 (Anthropic Artifacts 전용, perf) -->
<script>
(() => {
  const TAB_URLS = { home:'index.html', match:'match.html', map:'map.html', news:'news.html', my:'my.html' };
  document.querySelectorAll('.v3-nav-item').forEach(item => {
    if (item.dataset.tab === 'my') item.classList.add('active');
    item.addEventListener('click', () => {
      const tab = item.dataset.tab;
      if (tab === 'my') return;
      const url = TAB_URLS[tab];
      if (window !== window.top) { location.href = url; return; }
      const app = document.querySelector('.app');
      app.style.transition = 'transform 0.28s cubic-bezier(0.32,0.72,0.24,1),opacity 0.22s ease';
      app.style.transform = 'translateX(-60px)'; app.style.opacity = '0';
      setTimeout(() => { location.href = url; }, 220);
    });
  });

  const fromTab = sessionStorage.getItem('sg_from_tab');
  if (fromTab) {
    sessionStorage.removeItem('sg_from_tab');
    const app = document.querySelector('.app');
    app.style.transition = 'none'; app.style.transform = 'translateX(40px)'; app.style.opacity = '0';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      app.style.transition = 'transform 0.3s cubic-bezier(0.16,1,0.3,1),opacity 0.24s ease';
      app.style.transform = 'translateX(0)'; app.style.opacity = '1';
    }));
  }
})();
</script>
