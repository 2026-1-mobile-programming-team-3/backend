<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F5EDDE" />
  <title>시흥가개 — 봉사자 자격 신청</title>
  <link rel="stylesheet" as="style" crossorigin href="vendor/suit/SUIT-Variable.css" />
  <link rel="stylesheet" href="styles-v3.css" />
  <style>
    .edit-topbar { display:flex; align-items:center; gap:12px; padding:18px 24px 16px; }
    .back-btn { width:36px; height:36px; border-radius:12px; background:var(--card); border:1px solid var(--line);
      display:flex; align-items:center; justify-content:center; text-decoration:none; color:var(--ink-soft); }
    .page-title { font-size:17px; font-weight:900; color:var(--ink); flex:1; text-align:center; padding-right:36px; }
    .vr-hero { padding:0 24px 28px; }
    .vr-eyebrow { font-size:11px; font-weight:800; color:var(--mint); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:6px; }
    .vr-headline { font-size:24px; font-weight:900; letter-spacing:-0.045em; color:var(--ink); line-height:1.35; }
    .vr-sub { font-size:13px; font-weight:600; color:var(--ink-mute); margin-top:10px; line-height:1.55; }
    form { padding:0 24px; display:flex; flex-direction:column; gap:18px; }
    .form-field-group { display:flex; flex-direction:column; gap:6px; }
    .form-label { font-size:13px; font-weight:800; color:var(--ink); letter-spacing:-0.02em; }
    .form-label em { color:var(--raspberry); font-style:normal; }
    .form-field {
      width:100%; padding:14px 16px; border-radius:var(--r-lg);
      border:1.5px solid var(--line); background:var(--card);
      font:inherit; font-size:14px; font-weight:600; color:var(--ink);
      outline:none; transition:border-color 0.18s; box-sizing:border-box; resize:none;
    }
    .form-field:focus { border-color:var(--accent); }
    .form-field::placeholder { color:var(--ink-mute); }
    .char-count { font-size:11px; font-weight:700; color:var(--ink-mute); text-align:right; margin-top:-2px; }
    .btn-primary {
      width:100%; padding:16px; border-radius:var(--r-lg);
      background:var(--mint); color:#fff; border:none;
      font:inherit; font-size:15px; font-weight:900; cursor:pointer; margin-top:8px;
      transition:transform 0.18s var(--spring);
    }
    .btn-primary:active { transform:scale(0.97); }
    .btn-primary:disabled { opacity:0.5; }
    .info-card {
      margin:0 24px 18px; padding:14px 16px;
      background:var(--mint-soft); border:1px solid rgba(122,155,110,0.20); border-radius:var(--r-lg);
      font-size:12.5px; font-weight:600; color:var(--ink-soft); line-height:1.55;
    }
  </style>
</head>
<body>
<div class="app">
  <main class="screen">
    <header class="edit-topbar">
      <a class="back-btn" href="my.html"><i class="ph ph-arrow-left"></i></a>
      <h1 class="page-title">봉사자 자격 신청</h1>
    </header>

    <section class="vr-hero">
      <div class="vr-eyebrow">시흥가개 봉사단</div>
      <h2 class="vr-headline">반려동물과 함께하는<br/>봉사자로 활동해보세요</h2>
      <p class="vr-sub">봉사자가 되면 주변의 도움이 필요한 이웃에게 직접 응답할 수 있고, 활동 등급과 뱃지를 모을 수 있어요.</p>
    </section>

    <div class="info-card">
      관리자 승인 후 봉사자 권한이 부여돼요. 신청서는 자기소개, 봉사 경험, 가능한 지역·시간대를 적어주시면 좋아요.
    </div>

    <form id="vol-request-form">
      <div class="form-field-group">
        <label class="form-label" for="vol-title">제목</label>
        <input class="form-field" type="text" id="vol-title" placeholder="예: 봉사자 자격 요청드립니다." maxlength="80" />
      </div>
      <div class="form-field-group">
        <label class="form-label" for="vol-message">신청서 <em>*</em></label>
        <textarea class="form-field" id="vol-message" rows="8" maxlength="500"
          placeholder="자기소개·봉사 경험·가능한 활동 지역과 시간대 등을 자유롭게 적어주세요.&#10;예) 안녕하세요, 정왕동에 거주하며 차량으로 이동 지원이 가능합니다. 유기견 보호소에서 2년간 활동한 경험이 있습니다."></textarea>
        <div class="char-count"><span id="vol-message-count">0 / 500</span></div>
      </div>
      <button class="btn-primary" type="submit">신청하기</button>
    </form>

    <div style="height:env(safe-area-inset-bottom,0px)"></div>
  </main>
</div>
<script src="vendor/phosphor/phosphor.js"></script>
<script src="preview-app.js"></script>
<script>document.addEventListener("DOMContentLoaded", () => PreviewApp.bootVolunteerRequest());</script>
</body>
</html>
