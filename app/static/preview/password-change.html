<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F5EDDE" />
  <title>시흥가개 — 비밀번호 변경</title>
  <link rel="stylesheet" as="style" crossorigin href="vendor/suit/SUIT-Variable.css" />
  <link rel="stylesheet" href="styles-v3.css" />
  <style>
    .edit-topbar { display:flex; align-items:center; gap:12px; padding:18px 24px 16px; }
    .back-btn { width:36px; height:36px; border-radius:12px; background:var(--card); border:1px solid var(--line);
      display:flex; align-items:center; justify-content:center; text-decoration:none; color:var(--ink-soft); }
    .page-title { font-size:17px; font-weight:900; color:var(--ink); flex:1; text-align:center; padding-right:36px; }
    .info-card { margin:0 24px 18px; padding:14px 16px; background:var(--accent-soft);
      border:1px solid rgba(208,138,78,0.20); border-radius:var(--r-lg);
      font-size:12.5px; font-weight:600; color:var(--ink-soft); line-height:1.55; }
    form { padding:0 24px; display:flex; flex-direction:column; gap:14px; }
    .form-field-group { display:flex; flex-direction:column; gap:6px; }
    .form-label { font-size:13px; font-weight:800; color:var(--ink); }
    .form-field {
      width:100%; padding:14px 16px; border-radius:var(--r-lg);
      border:1.5px solid var(--line); background:var(--card);
      font:inherit; font-size:14px; font-weight:600; color:var(--ink);
      outline:none; box-sizing:border-box;
    }
    .form-field:focus { border-color:var(--accent); }
    .btn-primary { margin:16px 24px calc(16px + env(safe-area-inset-bottom,0px)); padding:16px;
      border-radius:var(--r-lg); background:var(--ink); color:#fff; border:none;
      font:inherit; font-size:15px; font-weight:900; cursor:pointer; }
  </style>
</head>
<body>
<div class="app">
  <main class="screen">
    <header class="edit-topbar">
      <a class="back-btn" href="settings.html"><i class="ph ph-arrow-left"></i></a>
      <h1 class="page-title">비밀번호 변경</h1>
    </header>

    <div class="info-card">
      변경 후 다른 기기에서 자동 로그아웃됩니다. 8자 이상, 영문·숫자·특수문자를 각각 1자 이상 포함해 주세요.
    </div>

    <form id="password-form">
      <div class="form-field-group">
        <label class="form-label" for="pw-current">현재 비밀번호</label>
        <input class="form-field" type="password" id="pw-current" autocomplete="current-password" required />
      </div>
      <div class="form-field-group">
        <label class="form-label" for="pw-new">새 비밀번호</label>
        <input class="form-field" type="password" id="pw-new" autocomplete="new-password" minlength="8" required />
      </div>
      <div class="form-field-group">
        <label class="form-label" for="pw-confirm">새 비밀번호 확인</label>
        <input class="form-field" type="password" id="pw-confirm" autocomplete="new-password" minlength="8" required />
      </div>
    </form>

    <button class="btn-primary" type="submit" form="password-form">변경하기</button>
  </main>
</div>
<script src="vendor/phosphor/phosphor.js"></script>
<script src="preview-app.js"></script>
<script>document.addEventListener("DOMContentLoaded", () => PreviewApp.bootPasswordChange());</script>
</body>
</html>
