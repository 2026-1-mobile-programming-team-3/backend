<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F5EDDE" />
  <title>시흥가개 — 프로필 편집</title>
  <link rel="stylesheet" as="style" crossorigin href="vendor/suit/SUIT-Variable.css" />
  <link rel="stylesheet" href="styles-v3.css" />
  <style>
    .edit-topbar { display:flex; align-items:center; gap:12px; padding:18px 24px 12px; }
    .back-btn { width:36px; height:36px; border-radius:12px; background:var(--card); border:1px solid var(--line);
      display:flex; align-items:center; justify-content:center; text-decoration:none; color:var(--ink-soft); }
    .page-title { font-size:18px; font-weight:900; color:var(--ink); flex:1; text-align:center; padding-right:36px; }

    .section-label { font-size:11.5px; font-weight:900; color:var(--ink-mute); letter-spacing:0.06em; text-transform:uppercase; padding:8px 24px 8px; }
    .section-card {
      margin:0 24px 16px; background:var(--card); border:1px solid var(--line);
      border-radius:var(--r-xl); overflow:hidden; box-shadow:var(--shadow-xs);
    }
    .field-row { display:flex; align-items:center; padding:14px 18px; border-bottom:1px solid var(--line); gap:12px; }
    .field-row:last-child { border-bottom:none; }
    .field-label { font-size:13.5px; font-weight:800; color:var(--ink); flex-shrink:0; min-width:64px; letter-spacing:-0.02em; }
    .field-input { flex:1; min-width:0; padding:0; border:none; background:transparent;
      font:inherit; font-size:14px; font-weight:600; color:var(--ink); outline:none; text-align:right; }
    .field-input::placeholder { color:var(--ink-mute); }
    .btn-gps {
      padding:7px 12px; border-radius:999px; background:var(--accent-soft); border:1px solid rgba(208,138,78,0.18);
      font:inherit; font-size:12px; font-weight:800; color:var(--accent); cursor:pointer;
      display:inline-flex; align-items:center; gap:4px;
    }
    .btn-gps i { font-size:13px; }
    .btn-primary { margin:16px 24px calc(16px + env(safe-area-inset-bottom,0px));
      padding:16px; border-radius:var(--r-lg); background:var(--accent); color:#fff; border:none;
      font:inherit; font-size:15px; font-weight:900; cursor:pointer; width:calc(100% - 48px); }
    .btn-primary:active { transform:scale(0.97); }
  </style>
</head>
<body>
<div class="app">
  <main class="screen">
    <header class="edit-topbar">
      <a class="back-btn" href="my.html"><i class="ph ph-arrow-left"></i></a>
      <h1 class="page-title">프로필 편집</h1>
    </header>

    <form id="profile-edit-form">
      <div class="section-label">기본 정보</div>
      <div class="section-card">
        <div class="field-row">
          <span class="field-label">닉네임</span>
          <input class="field-input" type="text" id="edit-nickname" placeholder="닉네임 (2~20자)" maxlength="20" required />
        </div>
        <div class="field-row">
          <span class="field-label">전화번호</span>
          <input class="field-input" type="tel" id="edit-phone" placeholder="010-1234-5678" maxlength="20" />
        </div>
        <div class="field-row">
          <span class="field-label">프로필 사진</span>
          <input class="field-input" type="url" id="edit-profile-image-url" placeholder="이미지 URL (선택)" maxlength="500" />
        </div>
      </div>

      <div class="section-label">지역</div>
      <div class="section-card">
        <div class="field-row">
          <span class="field-label">시</span>
          <input class="field-input" type="text" id="edit-region-si" placeholder="시흥시" maxlength="50" />
          <button type="button" class="btn-gps" id="btn-region-gps"><i class="ph ph-crosshair"></i>위치</button>
        </div>
        <div class="field-row">
          <span class="field-label">동</span>
          <input class="field-input" type="text" id="edit-region-dong" placeholder="정왕동" maxlength="50" />
        </div>
      </div>

      <button class="btn-primary" type="submit">저장하기</button>
    </form>
  </main>
</div>
<script src="vendor/phosphor/phosphor.js"></script>
<script src="preview-app.js"></script>
<script>document.addEventListener("DOMContentLoaded", () => PreviewApp.bootProfileEdit());</script>
</body>
</html>
