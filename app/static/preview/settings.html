<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F5EDDE" />
  <title>시흥가개 — 설정</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css" />
  <link rel="stylesheet" href="styles-v3.css" />
  <style>
    .edit-topbar { display:flex; align-items:center; gap:12px; padding:18px 24px 16px; }
    .back-btn { width:36px; height:36px; border-radius:12px; background:var(--card); border:1px solid var(--line);
      display:flex; align-items:center; justify-content:center; text-decoration:none; color:var(--ink-soft); }
    .page-title { font-size:18px; font-weight:900; letter-spacing:-0.04em; color:var(--ink); flex:1; text-align:center; padding-right:36px; }

    .section-label { font-size:11.5px; font-weight:900; color:var(--ink-mute); letter-spacing:0.06em; text-transform:uppercase; padding:8px 24px 8px; }
    .menu-card {
      margin:0 24px 12px; background:var(--card); border:1px solid var(--line); border-radius:var(--r-xl);
      overflow:hidden; box-shadow:var(--shadow-xs);
    }
    .menu-row {
      display:flex; align-items:center; gap:14px; padding:15px 18px; cursor:pointer;
      border-bottom:1px solid var(--line); text-decoration:none; color:inherit;
      transition:background 0.15s;
    }
    .menu-row:last-child { border-bottom:none; }
    .menu-row:active { background:var(--bg-2); }
    .menu-icon { width:32px; height:32px; border-radius:10px; background:var(--sand-soft); color:var(--sand);
      display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .menu-icon i { font-size:16px; }
    .menu-icon.account { background:var(--accent-soft); color:var(--accent); }
    .menu-icon.notif { background:var(--raspberry-soft); color:var(--raspberry); }
    .menu-icon.app { background:var(--mint-soft); color:var(--mint); }
    .menu-icon.etc { background:rgba(30,18,10,0.08); color:var(--ink-soft); }
    .menu-label { flex:1; font-size:14.5px; font-weight:700; color:var(--ink); letter-spacing:-0.025em; }
    .menu-sub { font-size:12px; font-weight:600; color:var(--ink-mute); }
    .menu-arrow { color:var(--ink-mute); }
    .menu-arrow i { font-size:16px; }

    /* 토글이 있는 행 */
    .toggle { position:relative; width:42px; height:24px; flex-shrink:0; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle .slider { position:absolute; cursor:pointer; inset:0; background:#ccc; border-radius:999px; transition:0.2s; }
    .toggle .slider::before { content:''; position:absolute; left:3px; top:3px; width:18px; height:18px; background:#fff; border-radius:50%; transition:0.2s; }
    .toggle input:checked + .slider { background:var(--accent); }
    .toggle input:checked + .slider::before { transform:translateX(18px); }

    .danger-zone {
      margin:18px 24px 24px; padding:14px 18px;
      background:var(--card); border:1.5px solid rgba(240,66,112,0.18); border-radius:var(--r-xl);
      display:flex; flex-direction:column; gap:6px;
    }
    .danger-zone a { color:var(--raspberry); font-size:14px; font-weight:800; text-decoration:none; padding:6px 0; }
  </style>
</head>
<body>
<div class="app">
  <main class="screen">
    <header class="edit-topbar">
      <a class="back-btn" href="my.html"><i class="ph ph-arrow-left"></i></a>
      <h1 class="page-title">설정</h1>
    </header>

    <div class="section-label">계정</div>
    <div class="menu-card">
      <a class="menu-row" href="profile-edit.html">
        <div class="menu-icon account"><i class="ph ph-user-circle"></i></div>
        <span class="menu-label">프로필 편집</span>
        <span class="menu-arrow"><i class="ph ph-caret-right"></i></span>
      </a>
      <a class="menu-row" href="my.html#pets">
        <div class="menu-icon account"><i class="ph ph-paw-print"></i></div>
        <span class="menu-label">반려동물 정보</span>
        <span class="menu-arrow"><i class="ph ph-caret-right"></i></span>
      </a>
      <a class="menu-row" href="volunteer-request.html">
        <div class="menu-icon account"><i class="ph ph-medal"></i></div>
        <span class="menu-label">봉사자 자격 신청</span>
        <span class="menu-arrow"><i class="ph ph-caret-right"></i></span>
      </a>
    </div>

    <div class="section-label">알림</div>
    <div class="menu-card">
      <div class="menu-row">
        <div class="menu-icon notif"><i class="ph ph-handshake"></i></div>
        <span class="menu-label">매칭 알림</span>
        <label class="toggle"><input type="checkbox" data-notif-cat="MATCH" checked /><span class="slider"></span></label>
      </div>
      <div class="menu-row">
        <div class="menu-icon notif"><i class="ph ph-hand-heart"></i></div>
        <span class="menu-label">봉사 알림</span>
        <label class="toggle"><input type="checkbox" data-notif-cat="VOLUNTEER" checked /><span class="slider"></span></label>
      </div>
      <div class="menu-row">
        <div class="menu-icon notif"><i class="ph ph-newspaper"></i></div>
        <span class="menu-label">소식·정책 알림</span>
        <label class="toggle"><input type="checkbox" data-notif-cat="NEWS" checked /><span class="slider"></span></label>
      </div>
      <div class="menu-row">
        <div class="menu-icon notif"><i class="ph ph-star"></i></div>
        <span class="menu-label">후기 알림</span>
        <label class="toggle"><input type="checkbox" data-notif-cat="REVIEW" checked /><span class="slider"></span></label>
      </div>
      <div class="menu-row">
        <div class="menu-icon notif"><i class="ph ph-bell"></i></div>
        <span class="menu-label">시스템 알림</span>
        <label class="toggle"><input type="checkbox" data-notif-cat="SYSTEM" checked /><span class="slider"></span></label>
      </div>
    </div>

    <div class="section-label">앱</div>
    <div class="menu-card">
      <a class="menu-row" href="profile-edit.html#region">
        <div class="menu-icon app"><i class="ph ph-map-pin"></i></div>
        <span class="menu-label">지역 설정</span>
        <span class="menu-sub" data-fill="region-dong">미설정</span>
        <span class="menu-arrow"><i class="ph ph-caret-right"></i></span>
      </a>
      <div class="menu-row">
        <div class="menu-icon app"><i class="ph ph-info"></i></div>
        <span class="menu-label">앱 버전</span>
        <span class="menu-sub">v3.0.0</span>
      </div>
    </div>

    <div class="section-label">기타</div>
    <div class="menu-card">
      <a class="menu-row" href="blocks.html">
        <div class="menu-icon etc"><i class="ph ph-prohibit"></i></div>
        <span class="menu-label">차단한 사용자</span>
        <span class="menu-arrow"><i class="ph ph-caret-right"></i></span>
      </a>
      <a class="menu-row" href="password-change.html">
        <div class="menu-icon etc"><i class="ph ph-lock-key"></i></div>
        <span class="menu-label">비밀번호 변경</span>
        <span class="menu-arrow"><i class="ph ph-caret-right"></i></span>
      </a>
      <a class="menu-row" href="/policy.html">
        <div class="menu-icon etc"><i class="ph ph-shield-check"></i></div>
        <span class="menu-label">개인정보 처리방침</span>
        <span class="menu-arrow"><i class="ph ph-caret-right"></i></span>
      </a>
      <a class="menu-row" href="/terms.html">
        <div class="menu-icon etc"><i class="ph ph-file-text"></i></div>
        <span class="menu-label">이용약관</span>
        <span class="menu-arrow"><i class="ph ph-caret-right"></i></span>
      </a>
      <button type="button" class="menu-row" style="border:none;background:none;width:100%;font-family:inherit;" id="btn-logout">
        <div class="menu-icon etc"><i class="ph ph-sign-out"></i></div>
        <span class="menu-label" style="text-align:left">로그아웃</span>
      </button>
    </div>

    <div class="danger-zone">
      <a href="account-delete.html">계정 탈퇴</a>
    </div>

    <div style="height:env(safe-area-inset-bottom,0px)"></div>
  </main>
</div>
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<script src="preview-app.js"></script>
<script>document.addEventListener("DOMContentLoaded", () => PreviewApp.bootSettings());</script>
</body>
</html>
